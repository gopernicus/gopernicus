<h2>Reset your password</h2>
{{if .DisplayName}}<p>Hi {{.DisplayName}},</p>{{end}}
<p>We received a request to reset your password. Use the token below to complete the reset:</p>
<p style="font-size: 14px; font-family: monospace; background: #f4f4f4; padding: 12px; word-break: break-all;">{{.Token}}</p>
<p>This token expires in {{.ExpiresIn}}.</p>
<p>If you didn't request a password reset, you can safely ignore this email.</p>
