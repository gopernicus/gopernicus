{{define "layout:minimal"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Subject}}</title>
</head>
<body style="margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #1f2937;">
    <div style="max-width: 600px; margin: 0 auto;">
        {{.Content}}
    </div>

    <hr style="margin: 32px 0 16px 0; border: none; border-top: 1px solid #e5e7eb;">

    <p style="margin: 0; font-size: 12px; color: #6b7280;">
        This is an automated message.
    </p>
</body>
</html>
{{end}}
